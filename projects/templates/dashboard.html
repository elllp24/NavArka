{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">Dashboard</h2>

    <div class="row">

        <!-- ADD PROJECT -->
        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h5>Add Project</h5>

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <input type="text" name="name" class="form-control mb-2" placeholder="Project Name">
                    <input type="text" name="location" class="form-control mb-2" placeholder="Location">

                    <select name="project_type" class="form-control mb-2">
                        <option value="realestate">Real Estate</option>
                        <option value="shipyard">Shipyard</option>
                    </select>

                    <input type="text" name="status" class="form-control mb-2" placeholder="Status">

                    <textarea name="description" class="form-control mb-2" placeholder="Description"></textarea>

                    <input type="file" name="image" class="form-control mb-2">

                    <button class="btn btn-success">Add Project</button>
                </form>
            </div>
        </div>

        <!-- PROJECT LIST -->
        <div class="col-md-8">
            <div class="card p-3 shadow">
                <h5>All Projects</h5>

                <table class="table">
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Action</th>
                    </tr>

                    {% for p in projects %}
                    <tr>
                        <td>{{ p.name }}</td>
                        <td>{{ p.project_type }}</td>
                        <td>
                            <a href="/delete/{{ p.id }}/" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}

                </table>

            </div>
        </div>

    </div>

</div>

{% endblock %}
